name: Repo validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate structure
        run: python scripts/validate_repo_structure.py
      - name: Lint skill files
        run: python scripts/lint_skill_files.py
      - name: Generate skill index
        run: python scripts/generate_skill_index.py
