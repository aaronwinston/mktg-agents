[pytest]
# Test markers for categorizing test types
markers =
    unit: Unit tests for individual functions and components
    integration: Integration tests for API endpoints with database
    e2e: End-to-end tests for complete user flows
    slow: Slow tests that require extensive setup
    rate_limit: Rate limiting tests

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts =
    --strict-markers
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing:skip-covered
    --cov-fail-under=20

# Ignore venv and migrations
norecursedirs = venv migrations .venv
